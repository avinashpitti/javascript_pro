<html>
    <head>
        <title>DOM</title>
    </head>
    <body>
        <button style="background-color: red;" 
                onmouseover="changeColor1()" 
                id="btn1"
        >
        MouseOver
        </button>
        <hr>
        <button style="background-color: rgb(77, 13, 13);" 
                onmouseout="changeColor2()" 
                id="btn2"
        >
        MouseOut
        </button>
        <hr>
        <button style="background-color: rgb(118, 133, 33);" 
                onclick="changeColor3()" 
                id="btn3"
        >
        Click
        </button>
        <hr>
        <button style="background-color: rgb(35, 207, 164);" 
                ondblclick="changeColor4()" 
                id="btn4"
        >
        Double Click
        </button>
        <hr>
        <input type="text" id="ip1" onfocus="changeColor5()"/>
        <hr>
        <input type="text" id="ip2" onblur="changeCase()"/>

        <script src="four.js"></script>
    </body>
</html>
