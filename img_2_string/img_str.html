<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>convert img to str</title>
</head>
<body>

    <h2>Convert image to string</h2>

    <form onsubmit="img2str(event)">
        <label>Upload image</label>
        <input type="file" id="imgInput" required>
        <input type="submit" value="Upload">
    </form>

    <img id="preview" width="300">

    <script src="img_2_str.js"></script>

</body>
</html>
